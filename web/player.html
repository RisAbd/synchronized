<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>synchronized</title>
<style>
  :root { color-scheme: light dark;
    --bg:#faf7f0; --fg:#201d16; --muted:#9a917f; --dim:#b9b1a0; --line:rgba(120,110,90,.18);
    --hl-fg:#141007; --accent:#b8891a; --card:#fffdf7; --chip:#f0ead9; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#100f0b; --fg:#efe8d6; --muted:#7c745f; --dim:#3f3a2e; --line:rgba(200,190,160,.14);
      --hl-fg:#fff3c4; --accent:#e4bf4a; --card:#191710; --chip:#211e15; } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:"Amiri","Scheherazade New","Noto Naskh Arabic","Times New Roman",serif; }
  body { overflow:hidden; }            /* скроллим только #text */

  /* --- шапка: компактная, чтобы максимум места тексту --- */
  header { position:fixed; top:0; inset-inline:0; z-index:20; background:var(--card);
    border-bottom:1px solid var(--line); backdrop-filter:blur(8px); }
  .top { display:flex; align-items:center; gap:10px; padding:8px 12px; direction:ltr; }
  .back { text-decoration:none; color:var(--muted); font:600 24px system-ui; padding:0 6px; border-radius:8px; }
  .back:active { background:var(--chip); }
  .title { flex:1; min-width:0; }
  .title b { display:block; font:600 14px system-ui; color:var(--fg);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .title span { font:11px system-ui; color:var(--muted); }
  audio { display:block; width:100%; height:38px; padding:0 8px 8px; }
  .chips { display:flex; gap:8px; overflow-x:auto; padding:0 12px 8px; direction:rtl;
    scrollbar-width:none; } .chips::-webkit-scrollbar{display:none}
  .chip { flex:none; background:var(--chip); border:none; color:var(--fg); cursor:pointer;
    font:600 15px "Amiri",serif; padding:6px 14px; border-radius:999px; white-space:nowrap; }
  .chip.on { background:var(--accent); color:#fff; }

  /* --- поток аятов: активный крупный в фокусе, остальное приглушено --- */
  #text { position:absolute; inset:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:44vh 22px 46vh; scroll-behavior:smooth;
    max-width:860px; margin:0 auto; }
  .stitle { text-align:center; color:var(--accent); font:600 clamp(1rem,4vw,1.35rem) system-ui;
    letter-spacing:.02em; margin:22px 0 10px; opacity:.7; }
  .ayah { display:block; text-align:center; color:var(--dim);
    font-size:clamp(1.15rem,4.6vw,1.7rem); line-height:1.75; margin:14px 0;
    padding:4px 6px; transition:color .35s, font-size .35s, opacity .35s; }
  .ayah .num { font:600 .62em system-ui; color:var(--muted); margin:0 .4em; opacity:.8; }
  .ayah.near { color:var(--muted); }          /* соседи текущего — чуть ярче фона */
  .ayah.active { color:var(--hl-fg); font-size:clamp(2rem,8.5vw,3.4rem); line-height:1.5; }
  .ayah.active .num { color:var(--accent); }

  /* --- постоянный индикатор «где сейчас» --- */
  #badge { position:fixed; z-index:30; bottom:14px; inset-inline-start:14px;
    display:flex; align-items:center; gap:8px; direction:rtl;
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    padding:6px 14px; box-shadow:0 4px 18px rgba(0,0,0,.18);
    font-family:"Amiri",serif; font-size:1.05rem; color:var(--fg); pointer-events:none;
    max-width:calc(100% - 28px); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #badge .a { font:700 .82rem system-ui; color:var(--accent); direction:ltr; }
  #badge.idle { opacity:.55; }

  #loading,#err { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    text-align:center; color:var(--muted); font:15px system-ui; padding:20px; }
</style>
</head>
<body>
<header>
  <div class="top">
    <a class="back" href="./" title="назад">‹</a>
    <div class="title"><b id="ttl">…</b><span id="sub"></span></div>
  </div>
  <audio id="audio" controls preload="metadata"></audio>
  <div class="chips" id="chips"></div>
</header>

<div id="text"><div id="loading">загрузка…</div></div>

<div id="badge" class="idle"><span class="ar" id="badgeSurah">—</span><span class="a" id="badgeAyah"></span></div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');
const audio = document.getElementById('audio');
const textEl = document.getElementById('text');
const chipsEl = document.getElementById('chips');
const badge = document.getElementById('badge');
const badgeSurah = document.getElementById('badgeSurah');
const badgeAyah = document.getElementById('badgeAyah');

let TL = [], elById = {}, chapEls = [], surahTitle = {};
let activeKey = null, activeEl = null, nearEls = [];
let userScrolling = false, scrollTimer = null, activeChap = -1;

const toArabic = n => String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
const fmt = t => { t=Math.max(0,t|0); return (t/60|0)+':'+String(t%60).padStart(2,'0'); };

init();
async function init(){
  if(!id){ fail('не указан ?id'); return; }
  let d;
  try { d = await (await fetch('data/'+id+'.json')).json(); }
  catch(e){ fail('не удалось загрузить данные'); return; }

  document.getElementById('ttl').textContent = d.title || id;
  document.getElementById('sub').textContent =
    (d.reciter ? d.reciter+' · ' : '') + fmt(d.duration||0);
  document.title = (d.title||'synchronized') + ' · synchronized';
  audio.src = 'audio/' + d.audio;
  TL = d.timeline;

  // поток аятов (сплошной; заголовки суры — лёгкие маркеры смены, не «оглавление»)
  textEl.innerHTML = '';
  for(const sec of d.sections){
    surahTitle[sec.surah] = sec.title;
    const h=document.createElement('div'); h.className='stitle';
    h.textContent='سورة '+sec.title; textEl.appendChild(h);
    for(const v of sec.ayat){
      const el=document.createElement('span'); el.className='ayah';
      el.id='a-'+sec.surah+'-'+v.ayah;
      el.innerHTML=v.text+' <span class="num">﴿'+toArabic(v.ayah)+'﴾</span>';
      textEl.appendChild(el); elById[sec.surah+':'+v.ayah]=el;
    }
  }
  // навигация по сурам
  d.chapters.forEach((c)=>{
    const b=document.createElement('button'); b.className='chip';
    b.textContent='سورة '+c.title;
    b.onclick=()=>{ audio.currentTime=c.t; audio.play(); };
    chipsEl.appendChild(b); chapEls.push({t:c.t, el:b});
  });

  audio.addEventListener('timeupdate', update);
  audio.addEventListener('seeked', update);
  textEl.addEventListener('wheel', pauseScroll, {passive:true});
  textEl.addEventListener('touchmove', pauseScroll, {passive:true});
}

function idxAt(t){ let lo=0,hi=TL.length-1,r=-1;
  while(lo<=hi){const m=(lo+hi)>>1; if(TL[m].t<=t){r=m;lo=m+1;}else hi=m-1;} return r; }

function update(){
  const t=audio.currentTime, i=idxAt(t);
  // активная глава (подсветка чипа)
  let ch=-1; for(let k=0;k<chapEls.length;k++) if(chapEls[k].t<=t+0.01) ch=k;
  if(ch!==activeChap){ if(chapEls[activeChap]) chapEls[activeChap].el.classList.remove('on');
    if(chapEls[ch]) chapEls[ch].el.classList.add('on'); activeChap=ch; }
  if(i<0) return;
  const e=TL[i], key=e.surah+':'+e.ayah;

  // индикатор «где сейчас» — обновляем всегда
  badge.classList.remove('idle');
  badgeSurah.textContent = 'سورة '+(surahTitle[e.surah]||e.surah);
  badgeAyah.textContent = e.surah+':'+e.ayah;

  if(key===activeKey) return;
  // снять прошлые
  if(activeEl) activeEl.classList.remove('active');
  nearEls.forEach(x=>x.classList.remove('near'));
  nearEls=[];

  activeKey=key; activeEl=elById[key];
  if(activeEl){
    activeEl.classList.add('active');
    // подсветить пару соседей как «контекст»
    for(const sib of [activeEl.previousElementSibling, activeEl.nextElementSibling]){
      if(sib && sib.classList.contains('ayah')){ sib.classList.add('near'); nearEls.push(sib); }
    }
    if(!userScrolling) activeEl.scrollIntoView({behavior:'smooth',block:'center'});
  }
}

function pauseScroll(){ userScrolling=true; badge.classList.add('idle');
  clearTimeout(scrollTimer);
  scrollTimer=setTimeout(()=>{ userScrolling=false;
    if(activeEl) activeEl.scrollIntoView({behavior:'smooth',block:'center'}); }, 3500); }

function fail(m){ textEl.innerHTML='<div id="err">'+m+'</div>'; }
</script>
</body>
</html>
