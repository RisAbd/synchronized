# Стек synchronized (dev): web (Django) + Redis + Celery-worker. БД — SQLite.
# Запуск:  docker compose up -d --build
# Веб: http://localhost:8000
#
# ⚠️ ДАННЫЕ. Никаких named volume для БД — их сносит `docker compose down -v`.
# БД (SQLite) и медиа примонтированы как bind-mount к хосту → переживают ЛЮБОЙ down,
# down -v, пересборку. Ничего не теряется.
#   ./service/db.sqlite3  ← боевая БД (записи + прогоны ASR с data внутри)
#   ./media/              ← аудио записей и сырые ответы ASR (media/rec/<id>/...)
#   ./work/               ← промежуточные выгрузки конвейера
#   ./cache/              ← кэш моделей (whisper→HF, MMS-onnx forced) — чтобы не докачивать на рестарт
# Код (./service, ./src) тоже примонтирован → Django на runserver с hot-reload,
# пересобирать образ после каждой правки не нужно.
#
# ⚠️ GPU: worker гоняет весь ML-конвейер (whisper + forced align) на GPU прямо в контейнере —
# больше НЕ нужны хостовые прогоны. Требуется на ХОСТЕ nvidia-container-toolkit (systemd/sudo):
#     curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
#     curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
#     sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
#     sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker
# Проверка:  docker run --rm --gpus all nvidia/cuda:12.4.0-base-ubuntu22.04 nvidia-smi
# Без тулкита worker не стартует (нет драйвера nvidia) — сначала поставь тулкит, потом up.
# whisper по-прежнему ТОЛЬКО GPU (src/asr._load_model): без GPU распознаёт google.
#
# ⚠️ user: 1000:1000 — контейнеры пишут media/work/db/cache от UID хоста (abd), а не root
# (root-овнед файлы блокировали хостовые прогоны — было, починили 04.07).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: service/Dockerfile
    restart: unless-stopped
    user: "${SYNC_UID:-1000}:${SYNC_GID:-1000}"
    environment: &appenv
      HOME: /app/.cache          # кэши/модели → примонтированный ./cache (persist, пишется от 1000)
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-key-change-me}
      DJANGO_ALLOWED_HOSTS: "*"
      # POSTGRES_* НЕ задаём → settings.py уходит в SQLite (service/db.sqlite3)
      CELERY_BROKER_URL: redis://redis:6379/0
      SYNC_RECOGNIZER: ${SYNC_RECOGNIZER:-whisper}
      # распознаватели по умолчанию для новых записей (forced НЕ здесь — он авто-пост-шаг)
      SYNC_RECOGNIZERS: ${SYNC_RECOGNIZERS:-whisper,google}
      # Модель whisper: дообученная под коранический арабский tarteel-ai/whisper-base-ar-quran,
      # сконвертированная в CTranslate2 (см. ./cache/ct2-tarteel-base, генерится ct2-transformers-converter).
      # Ванильный large-v3 на арабском измеренно ПЛОХ (rec9 5 слов на 21 мин), tarteel-base — 464 слова.
      # Если каталога нет — src/asr._default_model уходит в large-v3. Путь = ./cache смонтирован в /app/.cache.
      SYNC_WHISPER_MODEL: ${SYNC_WHISPER_MODEL:-/app/.cache/ct2-tarteel-base}
      # Google STT: ключ сервис-аккаунта кладём в ./creds/ (gitignored) → монтируется в /app/creds.
      # Бакет и live-флаг — через .env (compose читает его автоматически). Без ключа/бакета
      # gstt.is_available()==False → google тихо уходит в кэш/пропуск, запись живёт по whisper.
      GOOGLE_APPLICATION_CREDENTIALS: ${SYNC_GSTT_CRED_PATH:-/app/creds/gstt.json}
      SYNC_GSTT_BUCKET: ${SYNC_GSTT_BUCKET:-}
      SYNC_GSTT_LIVE: ${SYNC_GSTT_LIVE:-1}
    volumes:
      - ./service:/app/service    # код сервиса + db.sqlite3 (hot-reload + БД)
      - ./src:/app/src            # ядро конвейера (align/asr/quran/ingest)
      - ./data:/app/data:ro       # quran.db (Tanzil + редакция Diyanet) — читаем, пишет хост-скрипт
      - ./media:/app/media        # аудио записей + сырые ответы ASR (persist)
      - ./work:/app/work          # промежуточные выгрузки (persist)
      - ./cache:/app/.cache       # кэш моделей whisper/MMS (persist, не качать на рестарт)
      - ./creds:/app/creds:ro     # ключ Google STT (вне репо, gitignored) — read-only
    # runserver: hot-reload кода + отдача static в DEBUG
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      redis: {condition: service_started}

  worker:
    build:
      context: .
      dockerfile: service/Dockerfile
    restart: unless-stopped
    user: "${SYNC_UID:-1000}:${SYNC_GID:-1000}"
    environment: *appenv
    command: celery -A synchronized worker -l info --concurrency 1
    volumes:
      - ./service:/app/service
      - ./src:/app/src
      - ./data:/app/data:ro       # quran.db (Tanzil + редакция Diyanet) — читаем, пишет хост-скрипт
      - ./media:/app/media
      - ./work:/app/work
      - ./cache:/app/.cache       # кэш моделей whisper/MMS (persist, не качать на рестарт)
      - ./creds:/app/creds:ro     # ключ Google STT (вне репо, gitignored) — read-only
    # GPU для ML-конвейера (whisper + forced). Требует nvidia-container-toolkit на хосте
    # (см. шапку файла). Без него worker не стартует — ставь тулкит перед `up`.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      redis: {condition: service_started}
